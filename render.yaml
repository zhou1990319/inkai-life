services:
  - type: web
    name: inkai-life
    runtime: node
    repo: https://github.com/zhou1990319/inkai-life
    branch: main
    buildCommand: npm install && npm run build && cp sitemap.xml dist/
    startCommand: node server/index.js
    plan: free
    numInstances: 1
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        value: https://zgolsxdwilktnxbzxfcw.supabase.co
      - key: SUPABASE_ANON_KEY
        value: sb_publishable_VuoZts73EHjAOcYjtqBADw_QJ_IcuzNt
      - key: ARK_API_KEY
        value: ark-6b3fbf0f-2778-4bf6-a09f-c06b08d6b69d-796cd
      - key: KEEP_ALIVE_URL
        value: https://inkai.life/health
      # PayPal 支付配置
      # 拿到 PayPal API 凭证后，替换以下值为实际值
      - key: PAYPAL_CLIENT_ID
        value: "你的PayPal_Client_ID"
      - key: PAYPAL_CLIENT_SECRET
        value: "你的PayPal_Client_Secret"
      - key: PAYPAL_MODE
        value: "sandbox"
      - key: PAYPAL_WEBHOOK_ID
        value: ""
      # 可选：添加 Sentry DSN 启用错误监控
      # - key: SENTRY_DSN
      #   value: your-sentry-dsn-here