<!DOCTYPE html>

    /* 全局样式 - 国风暗黑风格 */
    * {

      background: #0A0908; /* 墨黑底色 */
      color: #F2F2F2;
      font-family: "Microsoft Yahei", "SimHei", Arial;
      min-height: 100vh;
      background-image: url("https://picsum.photos/id/175/1920/1080"); /* 国风暗纹背景 */
      background-blend-mode: overlay;
      background-size: cover;
      background-attachment: fixed;
    }
    /* 导航栏 */
    .navbar {
      padding: 20px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #332F2E;
      background: rgba(10,9,8,0.8);
      backdrop-filter: blur(10px);
    }
    .logo {
      font-size: 28px;
      color: #E63946; /* 朱砂红 */
      font-weight: bold;
    }
    .nav-links a {
      color: #F2F2F2;
      text-decoration: none;
      margin-left: 30px;
      font-size: 16px;
      transition: color 0.3s;
    }
    .nav-links a:hover {
      color: #E63946;
    }
    /* 核心内容区 */
    .hero {
      padding: 80px 5%;
      text-align: center;
      max-width: 1200px;
      margin: 0 auto;
    }
    .hero h1 {
      font-size: 60px;
      color: #E63946;
      margin-bottom: 20px;
      text-shadow: 0 0 10px rgba(230,57,70,0.3);
    }
    .hero p {
      font-size: 22px;
      margin-bottom: 40px;
      color: #D9D9D9;
      line-height: 1.8;
    }
    /* 功能按钮 */
    .btn-group {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 15px 30px;
      border-radius: 8px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      border: none;
    }
    .btn-primary {
      background: #E63946;
      color: white;
    }
    .btn-primary:hover {
      background: #C1121F;
      transform: translateY(-2px);
    }
    .btn-secondary {
      background: transparent;
      border: 2px solid #E63946;
      color: #E63946;
    }
    .btn-secondary:hover {
      background: rgba(230,57,70,0.1);
      transform: translateY(-2px);

<div id="generator" class="generator-section" style="max-width: 1200px; margin: 0 auto; padding: 60px 5%;">

        <img src="https://picsum.photos/id/66/300/300" style="width: 100%; border-radius: 8px; border: 1px solid #332F2E;">
      </div>
    </div>
  </div>
</div>
