<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>InkAI.life - 商用AI纹身平台</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
    body{background:#050505;color:#fff;background-image:url(https://picsum.photos/id/29/1920/1080);background-blend-mode:overlay}
    .nav{display:flex;justify-content:space-between;padding:20px;max-width:1200px;margin:auto}
    .logo{color:#f72a4b;font-size:24px;font-weight:bold}
    .btn{padding:10px 18px;border-radius:8px;border:none;background:#f72a4b;color:#fff;cursor:pointer}
    .container{max-width:1200px;margin:auto;padding:40px 20px}
    .ai-box{background:#111;padding:30px;border-radius:16px;margin-bottom:30px}
    input,select{width:100%;padding:14px;margin:10px 0;background:#222;border:none;border-radius:8px;color:#fff}
    .result{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:20px}
    .result img{width:100%;border-radius:12px}
    .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:none;place-items:center}
    .modal-box{background:#111;padding:30px;border-radius:16px;width:400px}
  </style>
</head>
<body>

<div class="nav">
  <div class="logo">InkAI.life</div>
  <div>
    <button class="btn" onclick="login()">登录</button>
    <button class="btn" onclick="register()">注册</button>
    <button class="btn" onclick="pay()">开通VIP $9.9</button>
  </div>
</div>

<div class="container">
  <div class="ai-box">
    <h2>🎨 AI商用纹身生成</h2>
    <input id="p" placeholder="关键词：水墨龙/莲花/凤凰/锦鲤">
    <select id="s">
      <option>水墨国风</option>
      <option>新中式</option>
      <option>暗黑国风</option>
    </select>
    <button class="btn" onclick="go()">🚀 生成高清纹身</button>
    <div class="result" id="result"></div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <div id="form"></div>
  </div>
</div>

<script>
const API = 'https://你的render后端.onrender.com/api';
let token = null;

async function go() {
  const r = await fetch(API+'/generate', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt: p.value, style: s.value })
  });
  const d = await r.json();
  result.innerHTML = `<img src="${d.img}">`;
}

function login() {
  form.innerHTML = `<h3>登录</h3><input placeholder="账号"><input placeholder="密码" type="password"><button class="btn" onclick="doLogin()">登录</button>`;
  modal.style.display = 'grid';
}

async function pay() {
  const r = await fetch(API+'/pay');
  const d = await r.json();
  window.open(d.url);
}
</script>
</body>
</html>
